<style>
  :root{
    --paper:#EFF2EA; --paper-2:#E6EBDD; --card:#F8FAF3;
    --ink:#1B2417; --ink-soft:#48543E; --line:#C9D2BB; --line-2:#DBE2CF;
    --pine:#2F4B2C; --pine-2:#3E6136; --gold:#B7891F; --gold-soft:#F0E4C4;
    --sky:#3C6E8E; --sky-soft:#DCE9EF; --rust:#AE4326; --rust-soft:#F3DDD3;
    --amber:#C6902A; --amber-soft:#F5E7C6; --grow:#4E7A3A; --grow-soft:#DEEAD1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;
    padding:22px 16px 64px;background-image:radial-gradient(var(--line-2) 0.6px, transparent 0.6px);background-size:22px 22px;}
  .wrap{max-width:1080px;margin:0 auto}
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .disp{font-family:'Space Grotesk',sans-serif}

  header.mast{border:1.5px solid var(--ink);background:var(--card);border-radius:6px;overflow:hidden;box-shadow:4px 4px 0 rgba(27,36,23,.10)}
  .mast-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--pine);color:#F3F6EC;border-bottom:1.5px solid var(--ink)}
  .brand{display:flex;align-items:center;gap:14px;min-width:0}
  .logo-img{height:30px;width:auto;display:block}
  .logo-fallback{display:none;font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.5px;background:var(--gold);color:#231a05;padding:4px 8px;border-radius:4px;white-space:nowrap}
  .brand .div{width:1px;height:30px;background:#5C7355}
  .brand h1{font-family:'Space Grotesk';font-weight:600;font-size:16px;letter-spacing:.2px;line-height:1.1}
  .brand h1 span{display:block;font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:#B9CDA5;margin-top:3px}
  .clock{text-align:right}
  .clock .t{font-family:'IBM Plex Mono';font-weight:600;font-size:20px;letter-spacing:1px;line-height:1}
  .clock .d{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:1.5px;color:#B9CDA5;text-transform:uppercase;margin-top:3px}

  .mast-strip{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;padding:10px 18px;background:var(--paper-2);border-bottom:1px solid var(--line);font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.4px}
  .mod-flag{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft)}
  .mod-flag .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:1px solid var(--ink-soft)}
  .mod-flag.on{color:var(--ink);font-weight:600}
  .mod-flag.on .dot{background:var(--gold);border-color:var(--ink)}
  .sep{color:var(--line)}

  .mast-ctrl{display:flex;align-items:center;gap:8px;padding:11px 18px;flex-wrap:wrap}
  .ctrl-lab{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-right:2px}
  .seg{display:flex;flex:1 1 auto;min-width:0;gap:6px;overflow-x:auto;padding-bottom:3px}
  .seg::-webkit-scrollbar{height:6px}.seg::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  .seg .dbtn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:62px;font-family:'IBM Plex Mono';padding:5px 9px;border:1.2px solid var(--ink);border-radius:6px;background:var(--card);color:var(--ink-soft);cursor:pointer}
  .seg .dbtn .dwk{font-size:11px;font-weight:600;letter-spacing:.5px}
  .seg .dbtn .ddt{font-size:9px;letter-spacing:.2px}
  .seg .dbtn .dtd{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:600;line-height:1}
  .seg .dbtn .dfc{display:flex;flex-direction:column;width:100%;margin-top:3px;padding-top:3px;border-top:1px solid var(--line-2)}
  .seg .dbtn.active .dfc{border-top-color:rgba(243,246,236,.25)}
  .seg .dbtn .dline{font-size:8px;letter-spacing:0;white-space:nowrap;line-height:1.45}
  .seg .dbtn .dline b{font-weight:600;opacity:.6;margin-right:2px}
  .seg .dbtn.active{background:var(--pine);color:#F3F6EC}
  .seg .dbtn.active .dtd{color:var(--gold-soft)}
  .seg .dbtn:hover:not(.active){background:var(--paper-2);color:var(--ink)}
  .seg .dbtn.wknd{border-style:dashed;color:#8A9A7C}
  .seg .dbtn.wknd.active{background:var(--ink-soft);color:#F3F6EC}
  .refresh{margin-left:auto;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.5px;border:1.2px solid var(--ink);background:var(--gold-soft);color:var(--ink);border-radius:5px;padding:6px 12px;cursor:pointer}
  .refresh:hover{background:var(--gold)}

  section{margin-top:26px}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
  .sec-num{font-family:'IBM Plex Mono';font-size:12px;color:var(--gold);font-weight:600;letter-spacing:1px}
  .sec-head h2{font-family:'Space Grotesk';font-size:16px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .sec-head .sub{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);letter-spacing:.5px;margin-left:auto;text-align:right}
  .rule{height:1.5px;background:var(--ink);opacity:.9;margin-bottom:14px}

  .stations{display:grid;grid-template-columns:1fr;gap:16px}
  /* stations always stacked (Charlotte over Fairview) */
  .station{border:1.3px solid var(--ink);border-radius:6px;background:var(--card);overflow:hidden;box-shadow:3px 3px 0 rgba(27,36,23,.08)}
  .st-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;background:var(--paper-2);border-bottom:1.2px solid var(--ink)}
  .st-id{display:flex;align-items:center;gap:9px}
  .st-code{font-family:'IBM Plex Mono';font-weight:600;font-size:13px;letter-spacing:1px;background:var(--pine);color:#F3F6EC;padding:3px 7px;border-radius:4px}
  .st-name{font-family:'Space Grotesk';font-weight:600;font-size:14px}
  .st-name small{display:block;font-family:'IBM Plex Mono';font-weight:400;font-size:10px;color:var(--ink-soft);letter-spacing:.5px}
  .st-now{text-align:right;font-family:'IBM Plex Mono'}
  .st-now .big{font-size:22px;font-weight:600;line-height:1}
  .st-now .sm{font-size:10.5px;color:var(--ink-soft);letter-spacing:.3px}
  .hourly{display:flex;overflow-x:auto;scroll-snap-type:x proximity;padding:12px 6px 14px;gap:0}
  .hourly::-webkit-scrollbar{height:7px}.hourly::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  .hr{flex:0 0 auto;width:58px;text-align:center;scroll-snap-align:start;padding:0 2px;border-right:1px dotted var(--line-2)}
  .hr:last-child{border-right:none}
  .hr .time{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--ink-soft)}
  .hr .ic{font-size:19px;line-height:1.3;margin:3px 0}
  .hr .tmp{font-family:'IBM Plex Mono';font-size:14px;font-weight:600}
  .hr .pop{font-family:'IBM Plex Mono';font-size:10px;color:var(--sky);min-height:13px}
  .hr .pop.dry{color:var(--line)}
  .hr .wnd{font-family:'IBM Plex Mono';font-size:9.5px;color:var(--ink-soft);letter-spacing:-.3px}
  .hr.warm .tmp{color:var(--rust)}.hr.cold .tmp{color:var(--sky)}
  .st-foot{padding:8px 14px 11px;border-top:1px solid var(--line);font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:4px 16px}
  .st-foot b{color:var(--ink);font-weight:600}

  /* Bands (harvest / market) */
  .band{border:1.3px solid var(--ink);border-left-width:6px;border-radius:6px;background:var(--card);padding:13px 16px;box-shadow:3px 3px 0 rgba(27,36,23,.08)}
  .band.good{border-left-color:var(--grow)} .band.watch{border-left-color:var(--amber)} .band.concern{border-left-color:var(--rust)}
  .band .bh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .band .bh .bt{font-family:'Space Grotesk';font-weight:600;font-size:15px}
  .band .status{font-family:'IBM Plex Mono';font-size:9.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid var(--ink)}
  .status.good{background:var(--grow-soft);color:var(--pine);border-color:var(--grow)}
  .status.watch{background:var(--amber-soft);color:#7a5a12;border-color:var(--amber)}
  .status.concern{background:var(--rust-soft);color:var(--rust);border-color:var(--rust)}
  .band .win{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-soft);letter-spacing:.4px;margin-left:auto}
  .band .bbody{font-size:13px;color:#2c3626}
  .band .bstats{display:flex;flex-wrap:wrap;gap:6px 8px;margin:9px 0 4px}
  .band .stat{font-family:'IBM Plex Mono';font-size:10.5px;background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:3px 8px}
  .band .stat b{color:var(--ink)}
  .band .region-note{font-size:12px;color:var(--ink-soft);margin-top:7px;padding-top:7px;border-top:1px dashed var(--line)}
  .band .region-note b{color:var(--ink)}
  .dchart{margin-top:11px;padding-top:9px;border-top:1px dashed var(--line)}
  .dchart-lg{display:flex;gap:16px;font-family:'IBM Plex Mono';font-size:9.5px;color:var(--ink-soft);margin-bottom:1px}
  .dchart-lg i{display:inline-block;vertical-align:middle;margin-right:4px}
  .dchart-lg i.tl{width:13px;height:0;border-top:2px solid var(--rust)}
  .dchart-lg i.pl{width:11px;height:8px;background:var(--sky);opacity:.35;border-radius:1px}
  .dsvg{display:block;max-width:420px}
  .dsvg .cx,.dsvg .cy{font-family:'IBM Plex Mono';font-size:8px;fill:var(--ink-soft)}

  .season-band{border:1.3px solid var(--ink);border-radius:6px;background:var(--grow-soft);padding:11px 15px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
  .season-band .leaf{font-size:20px;line-height:1}
  .season-band .txt{font-size:13px}
  .season-band .txt b{font-family:'Space Grotesk';font-weight:600}
  .season-band .txt .cap{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--pine);display:block;margin-bottom:2px}

  .notes{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:760px){.notes{grid-template-columns:1fr 1fr}}
  .note{border:1.2px solid var(--ink);border-left-width:5px;border-radius:5px;background:var(--card);padding:11px 13px}
  .note .nh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .note .chip{font-family:'IBM Plex Mono';font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--ink)}
  .note .region{font-family:'IBM Plex Mono';font-size:9.5px;letter-spacing:.5px;color:var(--ink-soft);margin-left:auto}
  .note .nt{font-family:'Space Grotesk';font-weight:600;font-size:14px}
  .note .nb{font-size:12.5px;color:#2c3626;margin-top:3px}
  .note.alert,.note.warning{border-left-color:var(--rust)} .note.alert .chip,.note.warning .chip{background:var(--rust-soft);color:var(--rust);border-color:var(--rust)}
  .note.watch{border-left-color:var(--amber)} .note.watch .chip{background:var(--amber-soft);color:#7a5a12;border-color:var(--amber)}
  .note.cold{border-left-color:var(--sky)} .note.cold .chip{background:var(--sky-soft);color:var(--sky);border-color:var(--sky)}
  .note.info{border-left-color:var(--grow)} .note.info .chip{background:var(--grow-soft);color:var(--pine);border-color:var(--grow)}

  .daily-loc{margin-bottom:14px}
  .daily-loc .dl-h{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:1px;color:var(--ink-soft);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px}
  .daily-loc .dl-h .st-code{font-size:11px}
  .drow{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px}
  .dcell{flex:0 0 auto;width:104px;border:1.2px solid var(--ink);border-radius:5px;background:var(--card);padding:9px 8px;text-align:center}
  .dcell .dow{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .dcell .dt{font-family:'IBM Plex Mono';font-size:9.5px;color:var(--ink-soft)}
  .dcell .dic{font-size:23px;margin:4px 0}
  .dcell .dtemp{font-family:'IBM Plex Mono';font-size:13px;font-weight:600}
  .dcell .dtemp .lo{color:var(--sky);font-weight:500}
  .dcell .dp{font-family:'IBM Plex Mono';font-size:10px;color:var(--sky);margin-top:2px}
  .dcell .dlab{font-size:10px;color:var(--ink-soft);margin-top:3px;line-height:1.25}

  /* Radar */
  .radar-wrap{border:1.3px solid var(--ink);border-radius:6px;overflow:hidden;background:var(--card);box-shadow:3px 3px 0 rgba(27,36,23,.08)}
  #radarMap{height:360px;width:100%;background:#dfe4d7}
  .leaflet-container{font-family:'IBM Plex Mono';background:#dfe4d7}
  .radar-bar{display:flex;align-items:center;gap:12px;padding:9px 14px;border-top:1.2px solid var(--ink);background:var(--paper-2);flex-wrap:wrap}
  .radar-btn{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.5px;border:1.2px solid var(--ink);background:var(--card);color:var(--ink);border-radius:5px;padding:5px 11px;cursor:pointer}
  .radar-btn:hover{background:var(--gold-soft)}
  .radar-time{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--ink)}
  .radar-legend{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono';font-size:10px;color:var(--ink-soft)}
  .radar-legend i{width:14px;height:10px;border-radius:2px;display:inline-block}
  .radar-legend .l1{background:#8fd1e8}.radar-legend .l2{background:#3fa34d}.radar-legend .l3{background:#e2b93b}.radar-legend .l4{background:#c0392b}

  .loading,.errbox{border:1.3px solid var(--ink);border-radius:6px;background:var(--card);padding:26px;text-align:center;font-family:'IBM Plex Mono';font-size:13px;color:var(--ink-soft)}
  .errbox{background:var(--rust-soft);color:var(--rust)}
  .blink{animation:bl 1.1s steps(2) infinite}@keyframes bl{50%{opacity:.25}}
  footer.foot{margin-top:34px;padding-top:14px;border-top:1.5px solid var(--line);font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-soft);letter-spacing:.4px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:8px}
  .weekend-note{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);background:var(--paper-2);border:1px dashed var(--line);border-radius:5px;padding:8px 12px;margin-top:10px;letter-spacing:.3px}
  @media (prefers-reduced-motion: reduce){.blink{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="mast-top">
      <div class="brand">
        <img class="logo-img" src="https://freshlist.com/cdn/shop/files/Freshlist_PrimaryLogo_White.png?v=1757270900&width=440" alt="Freshlist" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='inline-block'">
        <span class="logo-fallback" id="logoFallback">FRESHLIST</span>
        <span class="div"></span>
        <h1>Field &amp; Weather Briefing<span>Piedmont · Blue Ridge · Upstate SC</span></h1>
      </div>
      <div class="clock">
        <div class="t mono" id="clock">--:--</div>
        <div class="d mono" id="clockDate">LOADING</div>
      </div>
    </div>
    <div class="mast-strip" id="modStrip"></div>
    <div class="mast-ctrl">
      <span class="ctrl-lab">Forecast day</span>
      <div class="seg" id="daySeg"></div>
      <button class="refresh mono" id="refreshBtn">↻ REFRESH</button>
    </div>
  </header>

  <div id="content"><div class="loading" style="margin-top:26px">Contacting weather station<span class="blink">…</span></div></div>

  <footer class="foot">
    <span>Weather · Open-Meteo &nbsp;|&nbsp; Radar · RainViewer &nbsp;|&nbsp; refreshed <span id="lastFetch">—</span></span>
    <span>Briefing · M–F 7A–5P · no posts Sat/Sun</span>
  </footer>
</div>

<script>
/* ============================================================
   FRESHLIST DAILY FIELD & WEATHER BRIEFING
   Procurement & Ops lens · harvest-window aware · live radar
   ============================================================ */
const LOCATIONS = {
  hq:  { code:'CLT·HQ',  name:'Charlotte HQ',      zip:'28205', region:'piedmont',  lat:35.2145, lon:-80.7920 },
  rmt: { code:'FVW·NC', name:'Fairview', zip:'28730', region:'mountains', lat:35.4990, lon:-82.4144 }
};
const ROUTE = [
  { name:'Charlotte',   sub:'28205 · start',  lat:35.2271, lon:-80.8431 },
  { name:'Gastonia',    sub:'I-85 · ~30mi',   lat:35.2621, lon:-81.1873 },
  { name:'Gaffney',     sub:'I-85 · ~50mi',   lat:35.0718, lon:-81.6499 },
  { name:'Spartanburg', sub:'I-85 · ~70mi',   lat:34.9496, lon:-81.9320 },
  { name:'Greenville',  sub:'29601 · dest',   lat:34.8526, lon:-82.3940 }
];
const WMO = {0:['Clear','☀️'],1:['Mostly clear','🌤️'],2:['Partly cloudy','⛅'],3:['Overcast','☁️'],45:['Fog','🌫️'],48:['Icy fog','🌫️'],51:['Lt drizzle','🌦️'],53:['Drizzle','🌦️'],55:['Hvy drizzle','🌧️'],56:['Frz drizzle','🌧️'],57:['Frz drizzle','🌧️'],61:['Lt rain','🌦️'],63:['Rain','🌧️'],65:['Hvy rain','🌧️'],66:['Frz rain','🌧️'],67:['Frz rain','🌧️'],71:['Lt snow','🌨️'],73:['Snow','🌨️'],75:['Hvy snow','❄️'],77:['Snow','❄️'],80:['Lt showers','🌦️'],81:['Showers','🌧️'],82:['Downpour','⛈️'],85:['Snow shwr','🌨️'],86:['Snow shwr','🌨️'],95:['T-storm','⛈️'],96:['T-storm/hail','⛈️'],99:['Severe storm','⛈️']};
const wmo = c => WMO[c] || ['—','·'];
const STORMS=[82,95,96,99], HEAVY=[65,81,82];

/* season context + at-risk crop language, Piedmont NC + Upstate SC */
const CROP_CAL={
  0:['Deep winter','Supply narrow — tunnel greens, storage roots, brassicas. Hard-freeze losses possible on field crops.'],
  1:['Late winter','Overwintered greens, roots, early alliums. Late hard freezes can dent early field supply.'],
  2:['Early spring','Spring greens, first strawberries, asparagus ramping. Last-frost risk can shorten early lines fast.'],
  3:['Spring','Strawberry supply building, spring greens, radish/turnip, first tomatoes. Rain = berry-quality risk.'],
  4:['Late spring','Strawberry peak, brassicas, first squash/cukes. Heavy rain splits/rots berries — QC hard.'],
  5:['Early summer','Blueberries, squash, cucumbers, first tomatoes, sweet corn. Heat + storms start affecting quality.'],
  6:['Mid summer','Tomatoes, peppers, blueberries, blackberries, sweet corn, melons, SC peaches peak. Heat + storm season.'],
  7:['Late summer','Tomatoes, okra, melons, peaches, field peas. Peak heat = short shelf life; disease after wet spells.'],
  8:['Early fall','Fall greens, sweet potatoes, winter squash, mountain apples. Transplant supply hinges on moisture.'],
  9:['Fall','Apples, greens, brassicas, sweet potatoes. First-frost window opens in the mountains.'],
  10:['Late fall','Greens, roots, brassicas. First frost across the Piedmont ends tender summer lines.'],
  11:['Early winter','Tunnel greens, storage crops. Hard-freeze events narrow field supply.']
};
function heatItems(m){ if(m>=3&&m<=5) return 'strawberries, spring greens, herbs'; if(m>=6&&m<=8) return 'leafy greens, herbs, berries, tomatoes'; if(m>=9&&m<=10) return 'fall greens and tender brassicas'; return 'greens and herbs'; }
function splitItems(m){ if(m===3||m===4) return 'strawberries and tender greens'; if(m>=5&&m<=7) return 'blueberries, blackberries, and ripe tomatoes'; if(m>=8&&m<=9) return 'late tomatoes, melons, and soft fruit'; return 'ripe fruit and greens'; }
function frostItems(m){ if(m>=9&&m<=11) return 'the last of the tomatoes, peppers, squash, and tender greens'; if(m<=4) return 'early strawberries, blooms, and spring transplants'; return 'tender field crops'; }

let RAW={}, ROUTE_DATA=null, dayOffset=0;

async function getSeries(lat,lon){
  const p=new URLSearchParams({latitude:lat,longitude:lon,
    hourly:'temperature_2m,apparent_temperature,precipitation_probability,precipitation,weathercode,wind_speed_10m,wind_gusts_10m,relative_humidity_2m',
    daily:'temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode,wind_gusts_10m_max',
    temperature_unit:'fahrenheit',wind_speed_unit:'mph',precipitation_unit:'inch',timezone:'America/New_York',past_days:5,forecast_days:12});
  const r=await fetch('https://api.open-meteo.com/v1/forecast?'+p.toString()+'&_='+Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error('station '+r.status);
  return r.json();
}
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const DOW=['SUN','MON','TUE','WED','THU','FRI','SAT'], DOWLONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function briefingDate(){ const d=new Date(); if(dayOffset>0) d.setDate(d.getDate()+dayOffset); return d; }
function hoursFor(series,dateStr,h0,h1){ const H=series.hourly,out=[];
  for(let i=0;i<H.time.length;i++){ const t=H.time[i]; if(!t.startsWith(dateStr))continue; const hr=+t.slice(11,13); if(hr<h0||hr>h1)continue;
    out.push({hr,temp:Math.round(H.temperature_2m[i]),feels:Math.round(H.apparent_temperature[i]),pop:H.precipitation_probability[i]||0,precip:H.precipitation[i]||0,code:H.weathercode[i],wind:Math.round(H.wind_speed_10m[i]),gust:Math.round(H.wind_gusts_10m[i]),rh:H.relative_humidity_2m[i]}); }
  return out; }
const dayIndex=(s,ds)=>s.daily.time.indexOf(ds);
function dailyAt(s,i){ const D=s.daily; if(i<0||i>=D.time.length)return null;
  return {date:D.time[i],hi:Math.round(D.temperature_2m_max[i]),lo:Math.round(D.temperature_2m_min[i]),psum:D.precipitation_sum[i]||0,pop:D.precipitation_probability_max[i]||0,code:D.weathercode[i],gust:Math.round(D.wind_gusts_10m_max[i])}; }
function fmtHour(h){ const ap=h<12?'A':'P'; let x=h%12; if(x===0)x=12; return x+ap; }
function dowShort(ds){ return DOW[new Date(ds+'T12:00').getDay()]; }
function frostSeason(m){ if(m>=8&&m<=11)return ' First-frost window — track closely for the season\u2019s last field lines.'; if(m<=4)return ' Last-frost window — a late freeze can pull spring lines early.'; return ''; }

/* ===================== SUPPLY & QUALITY WATCH (procurement/ops lens) ===================== */
function fieldNotes(series,loc,dateStr){
  const notes=[], region=loc.region==='mountains'?'Blue Ridge':'Piedmont';
  const idx=dayIndex(series,dateStr), N=series.daily.time.length, get=i=>(i>=0&&i<N)?dailyAt(series,i):null;
  const today=get(idx); if(!today) return notes;
  const m=+dateStr.slice(5,7)-1;
  const add=(sev,title,body)=>notes.push({sev,region,title,body});

  let coldLo=999,cd=null; for(let i=idx;i<=idx+3;i++){const d=get(i);if(d&&d.lo<coldLo){coldLo=d.lo;cd=d;}}
  if(coldLo<=28) add('warning','Freeze — expect field losses',`Lows to ${coldLo}°F by ${dowShort(cd.date)} in the ${region}. Plan for an abrupt end to ${frostItems(m)}; shorted lines and last-call quantities likely — line up backup sourcing now.${frostSeason(m)}`);
  else if(coldLo<=32) add('warning','Freeze watch — tender lines at risk',`Lows near ${coldLo}°F ${dowShort(cd.date)} night. ${region} farms may lose tender crops; expect gaps and downgraded quality on cold-damaged items.${frostSeason(m)}`);
  else if(coldLo<=37) add('cold','Patchy frost — minor quality risk',`Lows ~${coldLo}°F on calm nights could nip low-field ${region} plantings. Watch for cosmetic damage on tender greens in incoming lots.${frostSeason(m)}`);

  let hotHi=-999,hd=null; for(let i=idx;i<=idx+2;i++){const d=get(i);if(d&&d.hi>hotHi){hotHi=d.hi;hd=d;}}
  if(hotHi>=97) add('warning','Extreme heat — shelf life & shorts',`Highs to ${hotHi}°F ${dowShort(hd.date)} across the ${region}. Expect wilting, soft/short-shelf-life ${heatItems(m)}, blossom drop cutting future volume, and possible shorted orders. Push cold-chain hard; receive early, cool fast, tighten QC.`);
  else if(hotHi>=90) add('watch','Heat stress — quality & cold-chain',`Highs ${hotHi}°F in the ${region}. Field heat shortens shelf life on ${heatItems(m)} — expect softer product and faster turn. Prioritize early receiving and pre-cooling; flag heat-sensitive lines to chefs.`);

  let br=null,after=null; for(let b=1;b<=4;b++){const d=get(idx-b);if(d&&d.psum>=0.9){br=d;after=b;break;}}
  if(br) add('watch',`Post-rain quality risk · +${after}d`,`${br.psum.toFixed(1)}" fell in the ${region} ${dowShort(br.date)}. ${splitItems(m).charAt(0).toUpperCase()+splitItems(m).slice(1)} split, soften, and mold 2–4 days out — expect higher cull rates and cosmetic downgrades. Inspect incoming lots harder and pre-stage substitutions.`);

  let wetSum=0,wetMax=0,wd=null; for(let i=idx;i<=idx+2;i++){const d=get(i);if(d){wetSum+=d.psum;if(d.psum>wetMax){wetMax=d.psum;wd=d;}}}
  if(wetMax>=1.5) add('warning','Heavy rain — shortages & delays',`Up to ${wetMax.toFixed(1)}" ${dowShort(wd.date)} (${wetSum.toFixed(1)}"/3d) in the ${region}. Saturated fields cut harvest access — expect short quantities and late availability on rain-sensitive lines. Confirm farm harvest windows before committing this week\u2019s orders.`);
  else if(wetSum>=1.2) add('watch','Wet stretch — variable supply',`~${wetSum.toFixed(1)}" over 3 days in the ${region}. Muddy fields slow picking; expect uneven volumes and more variable pack quality. Build slack into fill rates.`);

  let wetDays=0; for(let i=idx;i<=idx+4;i++){const d=get(i);if(d&&d.psum>=0.1)wetDays++;}
  const th=hoursFor(series,dateStr,9,18), avgRH=th.length?Math.round(th.reduce((a,b)=>a+b.rh,0)/th.length):0;
  if(wetDays>=3&&today.hi>=68&&today.hi<=90&&avgRH>=72) add('watch','Disease pressure — expect downgrades',`${wetDays}/5 days wet, warm (${today.hi}°F), humid (~${avgRH}% RH) in the ${region}. Prime for mildew/blight/anthracnose — anticipate higher cull rates and cosmetic downgrades on soft crops; plan for tighter grade-outs.`);

  let dry=0; for(let i=idx-4;i<=idx+4;i++){const d=get(i);if(d){if(d.psum<0.1)dry++;else if(i<=idx)dry=0;}}
  if(dry>=8&&today.hi>=82) add('watch','Dry & hot — sizing & shorts',`~${dry} dry days under ${today.hi}°F+ in the ${region}. Drought stress means smaller sizing, lighter yields, and possible shorts/price pressure on non-irrigated lines. Confirm sizing specs with buyers.`);

  let gust=0,gd=null; for(let i=idx;i<=idx+2;i++){const d=get(i);if(d&&d.gust>gust){gust=d.gust;gd=d;}}
  if(gust>=35) add('watch','High winds — harvest disruption',`Gusts to ${gust} mph ${dowShort(gd.date)} in the ${region}. Possible lodging/crop damage and paused field work — expect harvest-timing slips on affected farms.`);

  if(!notes.length) add('info','Steady supply conditions',`No frost, heat, wind, or heavy-rain flags in the ${region}. Expect normal quality, volume, and delivery reliability from area farms.`);
  return notes;
}

/* ===================== HARVEST WINDOW (Tue PM → Wed PM) ===================== */
function weekTueWed(d){ const off=2-d.getDay(); const tue=new Date(d); tue.setDate(d.getDate()+off); const wed=new Date(tue); wed.setDate(tue.getDate()+1); return {tue,wed}; }
function harvestAgg(series,tueStr,wedStr){
  const win=[...hoursFor(series,tueStr,12,23),...hoursFor(series,wedStr,0,17)];
  if(!win.length) return null;
  let rain=0,maxT=-999,minT=999,pop=0,storm=false,heavy=false;
  win.forEach(h=>{rain+=h.precip;maxT=Math.max(maxT,h.temp);minT=Math.min(minT,h.temp);pop=Math.max(pop,h.pop);if(STORMS.includes(h.code))storm=true;if(HEAVY.includes(h.code)||h.precip>=0.2)heavy=true;});
  let status='good'; if(storm||rain>=0.75||maxT>=95) status='concern'; else if(rain>=0.3||maxT>=90||heavy) status='watch';
  return {rain:+rain.toFixed(2),maxT,minT,pop,storm,heavy,status};
}
function harvestBand(dateStr,dow,tue,wed){
  const tueStr=ymd(tue),wedStr=ymd(wed);
  const pied=harvestAgg(RAW.hq,tueStr,wedStr);
  if(!pied) return '';
  const status=pied.status;
  let temporal;
  if(dow===1) temporal='This week\u2019s main harvest is coming up.';
  else if(dow===2||dow===3) temporal='This week\u2019s harvest is underway right now.';
  else temporal='This week\u2019s produce was harvested under these conditions.';
  const verdict={
    good:'Clean harvest window — expect solid quality and full availability across the week\u2019s produce.',
    watch:'Marginal window — expect some soft/short-shelf-life product and variable volumes. Tighten receiving QC and build slack into fill rates.',
    concern:'Rough window — wet, stormy, or extreme-heat harvest means elevated culls, splits, delays, and likely shorts. Confirm farm availability and pre-stage substitutions before promising this week\u2019s orders.'
  }[status];
  const wl=(pied.rain>=0.5)?' Produce picked wet holds up poorly — watch for splitting and rot on berries and tomatoes 2–4 days after delivery.':'';
  const dr=`${MON[tue.getMonth()]} ${tue.getDate()} PM → ${MON[wed.getMonth()]} ${wed.getDate()} PM`;
  const stats=`<span class="stat"><b>Rain</b> ${pied.rain}"</span><span class="stat"><b>Peak</b> ${pied.maxT}°F</span><span class="stat"><b>Rain chance</b> ${pied.pop}%</span>${pied.storm?'<span class="stat"><b>⛈ storms</b></span>':''}`;
  return `<div class="band ${status}"><div class="bh"><span class="status ${status}">${status}</span><span class="bt">Harvest Window · Tue PM → Wed PM</span><span class="win">${dr}</span></div>
    <div class="bbody">${temporal} ${verdict}${wl}</div><div class="bstats">${stats}</div></div>`;
}

function deliveryChartSVG(hrs){
  const N=hrs.length; if(!N) return '';
  const W=340,H=134,padL=30,padR=12,padB=20;
  const plotW=W-padL-padR, x0=padL, y0=H-padB, plotTop=26, plotH=y0-plotTop;
  const temps=hrs.map(h=>h.temp), pops=hrs.map(h=>h.pop);
  let tMin=Math.min(...temps), tMax=Math.max(...temps);
  if(tMax-tMin<6){tMax+=3;tMin-=3;}else{tMax+=2;tMin-=2;}
  const xAt=i=>x0+(N===1?plotW/2:(i/(N-1))*plotW);
  const yT=t=>y0-((t-tMin)/(tMax-tMin))*plotH;
  const bw=Math.max(3,plotW/N*0.5);
  const bars=hrs.map((h,i)=>{ if(h.pop<5) return ''; const bh=(h.pop/100)*plotH*0.62; return `<rect x="${(xAt(i)-bw/2).toFixed(1)}" y="${(y0-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="1.5" fill="var(--sky)" opacity="0.30"/>`; }).join('');
  const pts=hrs.map((h,i)=>`${xAt(i).toFixed(1)},${yT(h.temp).toFixed(1)}`).join(' ');
  const dots=hrs.map((h,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yT(h.temp).toFixed(1)}" r="1.9" fill="var(--rust)"/>`).join('');
  const xl=[0,3,6,9].filter(i=>i<N).map(i=>`<text x="${xAt(i).toFixed(1)}" y="${H-6}" text-anchor="middle" class="cx">${fmtHour(hrs[i].hr)}</text>`).join('');
  const yl=`<text x="${padL-4}" y="${(yT(tMax)+3).toFixed(1)}" text-anchor="end" class="cy">${Math.round(tMax)}°</text><text x="${padL-4}" y="${(yT(tMin)+3).toFixed(1)}" text-anchor="end" class="cy">${Math.round(tMin)}°</text>`;
  const maxPop=Math.max(...pops);
  return `<div class="dchart"><div class="dchart-lg"><span><i class="tl"></i> temp °F</span><span><i class="pl"></i> rain chance ${maxPop>=5?`· peak ${maxPop}%`:'· none'}</span></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" class="dsvg" role="img" aria-label="Temperature and rain chance across the delivery window">
      <line x1="${x0}" y1="${y0}" x2="${W-padR}" y2="${y0}" stroke="var(--line)" stroke-width="1"/>
      ${bars}<polyline points="${pts}" fill="none" stroke="var(--rust)" stroke-width="1.6" stroke-linejoin="round"/>${dots}${yl}${xl}
    </svg></div>`;
}

  return `<div class="station"><div class="st-head"><div class="st-id"><span class="st-code">${loc.code}</span><span class="st-name">${loc.name}<small>ZIP ${loc.zip} · ${loc.region==='mountains'?'Blue Ridge · NC':'Piedmont · HQ'}</small></span></div>
    <div class="st-now"><div class="big">${nic} ${readH.temp}°</div><div class="sm">${nlab} · ${isToday?'now':'midday'}</div></div></div>
    <div class="hourly" data-anchor="${anchor}">${renderHourly(hrs)}</div>
    <div class="st-foot"><span><b>Day</b> ${d?d.hi:maxT}° / ${d?d.lo:minT}°</span><span><b>Rain</b> ${totPop}% · ${d?d.psum.toFixed(2):'—'}"</span><span><b>Gusts</b> ${d?d.gust:Math.max(...hrs.map(h=>h.gust))} mph</span><span style="color:var(--ink-soft)">↔ scroll full 24h</span></div></div>`; }
function noteCard(n){ return `<div class="note ${n.sev}"><div class="nh"><span class="chip">${n.sev==='info'?'CLEAR':n.sev.toUpperCase()}</span><span class="region">${n.region.toUpperCase()}</span></div><div class="nt">${n.title}</div><div class="nb">${n.body}</div></div>`; }
function dailyCells(s,start,count){ let out=''; for(let k=0;k<count;k++){const d=dailyAt(s,start+k);if(!d)continue;const [lab,ic]=wmo(d.code);const dd=new Date(d.date+'T12:00');
  out+=`<div class="dcell"><div class="dow">${DOW[dd.getDay()]}</div><div class="dt">${MON[dd.getMonth()]} ${dd.getDate()}</div><div class="dic">${ic}</div><div class="dtemp">${d.hi}° <span class="lo">${d.lo}°</span></div><div class="dp">${d.pop>=15?d.pop+'%':'—'}</div><div class="dlab">${lab}</div></div>`;}
  return out; }
function dailyBlock(startFn,count){ let html=''; for(const key of ['hq','rmt']){const s=RAW[key],loc=LOCATIONS[key];
  html+=`<div class="daily-loc"><div class="dl-h"><span class="st-code">${loc.code}</span> ${loc.name}</div><div class="drow">${dailyCells(s,startFn(s),count)}</div></div>`;} return html; }
function routeSection(dateStr){ if(!ROUTE_DATA) return '<div class="loading mono">Loading I-85 corridor…</div>';
  const hours=[10,12,14,16]; let rows='';
  ROUTE.forEach((wp,wi)=>{ let cells=''; hours.forEach(h=>{const arr=hoursFor(ROUTE_DATA[wi],dateStr,h,h)[0];if(!arr){cells+='<td class="cell">—</td>';return;}const [lab,ic]=wmo(arr.code);cells+=`<td class="cell"><span class="ic">${ic}</span> <span class="v">${arr.temp}°</span>${arr.pop>=20?`<div class="pp">${arr.pop}%</div>`:''}</td>`;});
    rows+=`<tr><td class="wp">${wp.name}<small>${wp.sub}</small></td>${cells}</tr>`;});
  let haz=[]; ROUTE.forEach((wp,wi)=>{const win=hoursFor(ROUTE_DATA[wi],dateStr,10,16);const st=win.some(h=>STORMS.includes(h.code));const hv=win.some(h=>[65,81,82].includes(h.code)||h.precip>=0.2);const fg=win.some(h=>[45,48].includes(h.code));if(st)haz.push(`thunderstorms near ${wp.name}`);else if(hv)haz.push(`heavy rain near ${wp.name}`);if(fg)haz.push(`fog near ${wp.name}`);});
  const hazHtml=haz.length?`<span class="cap">Drive hazards · 10A–4P</span>${[...new Set(haz)].join(' · ')}. Build in buffer and confirm dock timing.`:`<span class="cap" style="color:var(--grow)">Corridor clear · 10A–4P</span>No storms, heavy rain, or fog flagged along I-85 in the travel window.`;
  return `<div class="route-wrap"><div class="route-leg"><b>Outbound</b> Charlotte → Greenville ≈ 10A–12P &nbsp;·&nbsp; <b>Return</b> ≈ 2P–4P &nbsp;·&nbsp; ~100 mi each way via I-85</div>
    <table class="rtable"><thead><tr><th style="text-align:left">Waypoint</th>${hours.map(h=>`<th>${fmtHour(h)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
    <div class="route-haz">${hazHtml}</div></div>`; }

/* route table + hazard styles injected once */
(function(){const s=document.createElement('style');s.textContent=`.route-wrap{border:1.3px solid var(--ink);border-radius:6px;background:var(--card);overflow:hidden;box-shadow:3px 3px 0 rgba(27,36,23,.08)}.route-leg{padding:8px 14px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.5px;background:var(--paper-2);border-bottom:1px solid var(--line);color:var(--ink-soft)}.route-leg b{color:var(--ink)}.rtable{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono';font-size:12px}.rtable th,.rtable td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line-2)}.rtable th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);background:var(--paper-2)}.rtable td.wp{text-align:left;font-weight:600;font-size:11.5px;white-space:nowrap}.rtable td.wp small{display:block;font-weight:400;color:var(--ink-soft);font-size:9.5px}.rtable .cell .ic{font-size:15px}.rtable .cell .v{font-size:11px}.rtable .cell .pp{font-size:9.5px;color:var(--sky)}.rtable tr:last-child td{border-bottom:none}.route-haz{padding:11px 14px;border-top:1.2px solid var(--ink);font-size:12.5px}.route-haz .cap{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:3px}`;document.head.appendChild(s);})();

/* ===================== RADAR (Leaflet + RainViewer) ===================== */
function cleanupRadar(){ if(window.__radar){ try{clearInterval(window.__radar.timer);}catch(e){} try{window.__radar.map.remove();}catch(e){} window.__radar=null; } }
async function initRadar(){
  const div=document.getElementById('radarMap'); if(!div) return;
  if(typeof L==='undefined'){ setTimeout(initRadar,300); return; }
  cleanupRadar();
  const map=L.map('radarMap',{zoomControl:true,scrollWheelZoom:false,maxZoom:18}).setView([35.15,-81.30],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
  const mk=(la,lo,lab,fill)=>L.circleMarker([la,lo],{radius:7,color:'#1B2417',weight:2,fillColor:fill,fillOpacity:1}).addTo(map).bindTooltip(lab,{direction:'top'});
  mk(LOCATIONS.hq.lat,LOCATIONS.hq.lon,'CLT·HQ (28205)','#B7891F');
  mk(LOCATIONS.rmt.lat,LOCATIONS.rmt.lon,'FVW·NC (28730)','#4E7A3A');
  L.polyline(ROUTE.map(w=>[w.lat,w.lon]),{color:'#2F4B2C',weight:2,dashArray:'5,5',opacity:.7}).addTo(map).bindTooltip('I-85 · Charlotte ⇄ Greenville',{sticky:true});
  window.__radar={map,timer:null,layers:[],frames:[],idx:0};
  setTimeout(()=>map.invalidateSize(),80);
  let data=window.__rvFrames;
  if(!data){ try{ const r=await fetch('https://api.rainviewer.com/public/weather-maps.json'); data=await r.json(); window.__rvFrames=data; }catch(e){ const t=document.getElementById('radarTime'); if(t)t.textContent='radar feed unavailable'; return; } }
  if(!document.getElementById('radarMap')) return; // re-rendered away
  const host=data.host, past=data.radar.past||[], now=data.radar.nowcast||[], frames=[...past,...now];
  const layers=frames.map(f=>L.tileLayer(`${host}${f.path}/256/{z}/{x}/{y}/4/1_1.png`,{opacity:0,zIndex:5,maxNativeZoom:11,maxZoom:18}));
  layers.forEach(l=>l.addTo(map));
  window.__radar.layers=layers; window.__radar.frames=frames;
  const nPast=past.length;
  const show=n=>{ layers.forEach((l,k)=>l.setOpacity(k===n?0.62:0)); const t=new Date(frames[n].time*1000); const el=document.getElementById('radarTime'); if(el)el.textContent=t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+(n>=nPast?' · nowcast':(n===nPast-1?' · latest':'')); window.__radar.idx=n; };
  show(nPast-1>=0?nPast-1:0);
  const play=()=>{ window.__radar.timer=setInterval(()=>{ show((window.__radar.idx+1)%layers.length); },700); };
  play();
  const btn=document.getElementById('radarPlay');
  if(btn) btn.onclick=()=>{ if(window.__radar.timer){clearInterval(window.__radar.timer);window.__radar.timer=null;btn.textContent='▶ PLAY';}else{play();btn.textContent='⏸ PAUSE';} };
}

/* ===================== MASTER RENDER ===================== */
function hourlySectionHTML(numStr,dateStr,dow,d,isToday){
  return `<section><div class="sec-head"><span class="sec-num mono">${numStr}</span><h2>Hourly · 24-hour</h2><span class="sub">${DOWLONG[dow]} · ${MON[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${isToday?' · today':''}</span></div><div class="rule"></div>
    <div class="stations">${stationCard('hq',dateStr,isToday)}${stationCard('rmt',dateStr,isToday)}</div></section>`;
}
function radarSectionHTML(numStr){
  return `<section><div class="sec-head"><span class="sec-num mono">${numStr}</span><h2>Regional Radar</h2><span class="sub">live loop · Piedmont → Upstate</span></div><div class="rule"></div>
    <div class="radar-wrap"><div id="radarMap"></div><div class="radar-bar"><button id="radarPlay" class="radar-btn mono">⏸ PAUSE</button><span class="radar-time mono" id="radarTime">loading…</span><span class="radar-legend"><i class="l1"></i>light<i class="l2"></i>mod<i class="l3"></i>heavy<i class="l4"></i>storm</span></div></div></section>`;
}
function positionHourly(){
  document.querySelectorAll('.hourly[data-anchor]').forEach(cont=>{
    const a=+cont.dataset.anchor, cell=cont.querySelector(`.hr[data-hr="${a}"]`);
    if(cell) cont.scrollLeft=Math.max(0,cell.offsetLeft-8);
  });
}
function afterRender(){ initRadar(); positionHourly(); }
function render(){
  cleanupRadar();
  const d=briefingDate(),dateStr=ymd(d),dow=d.getDay(),isWeekend=(dow===0||dow===6);
  const isToday=(dateStr===ymd(new Date()));
  const c=document.getElementById('content');
  let html='',n=1; const num=()=>String(n++).padStart(2,'0');

  let mods;
  if(isWeekend){ mods=[{on:true,label:'HOURLY'},{on:dow===6,label:'SAT · MARKET'},{on:true,label:'RADAR'}]; }
  else {
    mods=[{on:true,label:'HOURLY'}];
    if(dow===2||dow===3) mods.push({on:true,label:'HARVEST'});
    mods.push({on:true,label:'SUPPLY'},{on:true,label:'RADAR'});
    if(dow===1) mods.push({on:true,label:'MON · MARKET'},{on:true,label:'5-DAY'});
    if(dow===3) mods.push({on:true,label:'WED · RECEIVING + ROUTE'});
    if(dow===4) mods.push({on:true,label:'THU · DELIVERIES'});
    if(dow===5) mods.push({on:true,label:'FRI · DELIVERIES'});
  }
  document.getElementById('modStrip').innerHTML=mods.map((m,i)=>`${i?'<span class="sep">/</span>':''}<span class="mod-flag ${m.on?'on':''}"><span class="dot"></span>${m.label}</span>`).join('');

  /* ---- Weekend: real forecast, reference only (not posted) ---- */
  if(isWeekend){
    html+=`<div class="weekend-note" style="margin-top:26px">Weekend forecast — <b>reference only, not posted</b>. Briefings publish Monday–Friday; this view is here for planning.</div>`;
    html+=hourlySectionHTML(num(),dateStr,dow,d,isToday);
    if(dow===6){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Saturday Farmers Market</h2><span class="sub">outdoor · ~8A–12P</span></div><div class="rule"></div>${farmersMarketBand(dateStr)}</section>`; }
    html+=radarSectionHTML(num());
    c.innerHTML=html; requestAnimationFrame(afterRender); return;
  }

  const {tue,wed}=weekTueWed(d);

  // 1 hourly
  html+=hourlySectionHTML(num(),dateStr,dow,d,isToday);

  // 2 day-specific ops callout
  if(dow===1){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Market Day</h2><span class="sub">indoor market · 2–6P</span></div><div class="rule"></div>${marketBand(dateStr)}</section>`; }
  if(dow===3){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Receiving Day + Greenville Route</h2><span class="sub">hub intake · I-85 round trip</span></div><div class="rule"></div>${receivingBand(dateStr)}<div style="height:12px"></div>${routeSection(dateStr)}</section>`; }
  if(dow===4||dow===5){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Restaurant Deliveries</h2><span class="sub">${DOWLONG[dow]} · route conditions</span></div><div class="rule"></div>${deliveryBand(dateStr)}</section>`; }

  // 3 harvest window (Tue/Wed only — post-harvest quality carries into Supply & Quality Watch)
  if(dow===2||dow===3){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Harvest Window</h2><span class="sub">bulk pick · Tue PM → Wed PM</span></div><div class="rule"></div>${harvestBand(dateStr,dow,tue,wed)}</section>`; }

  // 4 supply & quality watch
  const month=d.getMonth(),[sName,sBody]=CROP_CAL[month];
  const notes=fieldNotes(RAW.hq,LOCATIONS.hq,dateStr);
  const rank={alert:0,warning:1,watch:2,cold:3,info:4}; notes.sort((a,b)=>rank[a.sev]-rank[b.sev]);
  html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>Supply &amp; Quality Watch</h2><span class="sub">procurement &amp; ops impact</span></div><div class="rule"></div>
    <div class="season-band"><span class="leaf">🌾</span><div class="txt"><span class="cap">${MON[month]} · ${sName}</span>${sBody}</div></div>
    <div class="notes">${notes.map(noteCard).join('')}</div></section>`;

  // 5 radar
  html+=radarSectionHTML(num());

  // 6 5-day (Mon)
  if(dow===1){ html+=`<section><div class="sec-head"><span class="sec-num mono">${num()}</span><h2>5-Day Outlook</h2><span class="sub">both stations · week ahead</span></div><div class="rule"></div>${dailyBlock(s=>dayIndex(s,dateStr),5)}</section>`; }

  c.innerHTML=html;
  requestAnimationFrame(afterRender);
}

/* ===================== BOOT / CONTROLS ===================== */
async function loadAll(){
  const c=document.getElementById('content'); c.innerHTML=`<div class="loading" style="margin-top:26px">Contacting weather station<span class="blink">…</span></div>`;
  try{
    const [hq,rmt]=await Promise.all([getSeries(LOCATIONS.hq.lat,LOCATIONS.hq.lon),getSeries(LOCATIONS.rmt.lat,LOCATIONS.rmt.lon)]);
    RAW.hq=hq; RAW.rmt=rmt;
    ROUTE_DATA=await Promise.all(ROUTE.map(w=>getSeries(w.lat,w.lon)));
    document.getElementById('lastFetch').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    render(); decorateDaySeg();
  }catch(e){ c.innerHTML=`<div class="errbox" style="margin-top:26px">Couldn\u2019t reach the weather service — ${e.message}. Check the connection and hit ↻ REFRESH.</div>`; }
}
function buildDaySeg(){
  const seg=document.getElementById('daySeg'), now=new Date(); let html='';
  for(let i=0;i<10;i++){ const dd=new Date(now); dd.setDate(now.getDate()+i);
    const wknd=(dd.getDay()===0||dd.getDay()===6);
    html+=`<button class="dbtn ${wknd?'wknd':''}" data-off="${i}"><span class="dwk">${DOW[dd.getDay()]}</span><span class="ddt">${MON[dd.getMonth()]} ${dd.getDate()}</span>${i===0?'<span class="dtd">today</span>':''}<span class="dfc"></span></button>`;
  }
  seg.innerHTML=html;
  const setActive=()=>[...seg.children].forEach(b=>b.classList.toggle('active',+b.dataset.off===dayOffset));
  seg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;dayOffset=+b.dataset.off;setActive();if(RAW.hq)render();});
  setActive(); decorateDaySeg();
}
function decorateDaySeg(){
  if(!RAW.hq||!RAW.rmt) return;
  const now=new Date();
  document.querySelectorAll('#daySeg .dbtn').forEach(b=>{
    const i=+b.dataset.off, dd=new Date(now); dd.setDate(now.getDate()+i); const ds=ymd(dd);
    const el=b.querySelector('.dfc'); if(!el) return;
    const line=(key,lab)=>{ const d=dailyAt(RAW[key],dayIndex(RAW[key],ds)); if(!d) return `<span class="dline"><b>${lab}</b> —</span>`; const [,ic]=wmo(d.code); return `<span class="dline"><b>${lab}</b> ${ic} ${d.lo}/${d.hi}</span>`; };
    el.innerHTML=line('hq','CLT')+line('rmt','FVW');
  });
}
function tickClock(){ const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clockDate').textContent=DOW[now.getDay()]+' · '+MON[now.getMonth()].toUpperCase()+' '+now.getDate()+' '+now.getFullYear(); }
document.getElementById('refreshBtn').addEventListener('click',loadAll);
buildDaySeg(); tickClock(); setInterval(tickClock,15000); loadAll();
</script>
